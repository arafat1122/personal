<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arafat Hossen | Operations & Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Cinematic Landscape Hero Block -->
    <section class="hero-banner">
        <div class="hero-content">
            <div class="hero-text-group">
                <h1 id="user-name">Loading...</h1>
                <p id="user-bio" class="tagline"></p>
            </div>
            <div class="cta-group">
                <a id="cv-link" href="#" target="_blank" class="btn btn-filled">View Resume</a>
                <a href="#projects-anchor" class="btn btn-outlined">The Technology</a>
            </div>
        </div>
        <div class="hero-bg-wrapper">
            <img id="profile-pic" src="" alt="Arafat Hossen" class="hero-bg-img">
        </div>
    </section>

    <!-- Trusted By / Professional Certification Marquee -->
    <section class="marquee-section">
        <div class="marquee-label">Certified By</div>
        <div class="marquee-grid">
            <div class="badge-logo">GOOGLE</div>
            <div class="badge-logo">AWS</div>
            <div class="badge-logo">SAYLOR</div>
        </div>
    </section>

    <!-- Technical Division Navigation Filter -->
    <nav class="section-nav">
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterSkills('all', event)">All Divisions</button>
            <button class="filter-btn" onclick="filterSkills('tools', event)">Data & Analytics</button>
            <button class="filter-btn" onclick="filterSkills('frontend', event)">Frontend UI</button>
            <button class="filter-btn" onclick="filterSkills('backend', event)">Backend Development</button>
        </div>
    </nav>
    <div id="skills-container" class="skills-container-grid"></div>

    <!-- Professional Experience Timeline Sector -->
    <section class="experience-section">
        <h2 class="section-heading-minimal">Professional History</h2>
        <div id="experience-timeline" class="timeline-container"></div>
    </section>

    <!-- Asymmetric Split Feature Showcases -->
    <section class="cases-section" id="projects-anchor">
        <h2>Engineered Systems</h2>
        <div id="projects-container"></div>
    </section>

    <!-- Minimal Product Footer -->
    <footer>
        <p>© 2026 Arafat Hossen. Meticulously engineered for simpler digital infrastructure.</p>
        <p>Dhaka, BD • arafatho776@gmail.com</p>
    </footer>

    <!-- Async Data Mapping Engine -->
    <script>
        const fallbackData = {
            name: 'Arafat Hossen',
            tagline: 'Data Analyst & Operations Engineer',
            bio: 'Specializing in statistical computing, operational data pipelines, and analytics infrastructure. Transforming raw transactional data into high-fidelity business intelligence frameworks.',
            profile_img: 'profile.jpeg',
            cv_file: 'your-cv.pdf',
            skills: [
                { name: 'Predictive Statistical Modeling', category: 'tools' },
                { name: 'Quantitative Data Analytics', category: 'tools' },
                { name: 'Advanced Spreadsheet Architecture', category: 'tools' },
                { name: 'Data Visualization & Dashboards', category: 'tools' },
                { name: 'Business Intelligence (BI)', category: 'tools' },
                { name: 'Semantic HTML5 & Modern CSS3', category: 'frontend' },
                { name: 'Responsive UI Architecture', category: 'frontend' },
                { name: 'Asynchronous API Integration', category: 'frontend' },
                { name: 'Object-Oriented Java Systems', category: 'backend' },
                { name: 'Structured C Programming', category: 'backend' },
                { name: 'Algorithm Design & Structures', category: 'backend' }
            ],
            experience: [
                {
                    role: 'Co-Founder & Operations Lead',
                    company: "Edu'tutors",
                    duration: '2024 — 2025',
                    bullets: [
                        'Architected foundational operational data structures, streamlining student onboarding and performance telemetry tracking.',
                        'Automated repetitive workflow routines using advanced scripting and macros, reducing manual management latency by 40%.',
                        'Designed comprehensive reporting models used weekly to audit operational workflows, financial projections, and student milestones.'
                    ]
                },
                {
                    role: 'Freelance Data & Analytics Specialist',
                    company: 'Contract',
                    duration: '2023 — 2024',
                    bullets: [
                        'Cleaned and engineered anomalies out of unstructured transactional datasets for small-to-medium enterprise clients.',
                        'Delivered interactive corporate intelligence dashboards, enabling non-technical stakeholders to identify hidden structural bottlenecks.'
                    ]
                }
            ],
            projects: [
                {
                    title: 'Automated Automotive Valuation Engine',
                    tech: 'Machine Learning • Predictive Modeling • Regression Analytics',
                    description: 'Engineered an end-to-end predictive valuation system utilizing multivariate regression algorithms to estimate market vehicle pricing. Constructed automated data preprocessing pipelines to handle non-linear feature interactions, structural anomalies, and high-cardinality categorical data, significantly optimizing model pricing accuracy.',
                    link: 'https://github.com/your-username'
                },
                {
                    title: 'Enterprise Business Performance Engine',
                    tech: 'Statistical Computing • Analytics • Visualization',
                    description: 'Engineered an end-to-end telemetry system to ingest, clean, and structure high-volume transactional records. Applied advanced multivariate statistical modeling to isolate hidden market trends and deployed crisp executive-level visual dashboards.',
                    link: 'https://github.com/your-username'
                }
            ]
        };

        function loadPortfolioData() {
            return fetch('./data.json', { cache: 'no-store' })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return response.json();
                })
                .catch(() => fallbackData);
        }

        loadPortfolioData().then(data => {
            document.getElementById('user-name').innerText = data.name;
            document.getElementById('user-bio').innerText = data.tagline || data.bio;
            document.getElementById('profile-pic').src = data.profile_img;
            document.getElementById('cv-link').href = data.cv_file;

            // Skills mapping
            const skillsContainer = document.getElementById('skills-container');
            data.skills.forEach(skill => {
                const div = document.createElement('div');
                div.className = 'skill-chip';
                div.setAttribute('data-category', skill.category);
                div.innerText = skill.name;
                skillsContainer.appendChild(div);
            });

            // Experience history timeline rendering loop
            const experienceTimeline = document.getElementById('experience-timeline');
            data.experience.forEach(exp => {
                const block = document.createElement('div');
                block.className = 'timeline-block';

                let bulletsHTML = exp.bullets.map(bullet => `<li>${bullet}</li>`).join('');

                block.innerHTML = `
                    <div class="timeline-meta">
                        <span class="timeline-date">${exp.duration}</span>
                    </div>
                    <div class="timeline-content-card">
                        <h3>${exp.role}</h3>
                        <h4>${exp.company}</h4>
                        <ul class="timeline-bullets">${bulletsHTML}</ul>
                    </div>
                `;
                experienceTimeline.appendChild(block);
            });

            // Projects mapping with dynamic layout assignment
            const projectsContainer = document.getElementById('projects-container');
            data.projects.forEach((project, index) => {
                const row = document.createElement('div');
                row.className = 'case-row';
                row.innerHTML = `
                    <div class="case-graphic-placeholder project-${index}">
                        <span>${project.title.split(' ')[0]}</span>
                    </div>
                    <div class="case-text-block">
                        <p class="project-tech">${project.tech}</p>
                        <h3>${project.title}</h3>
                        <p>${project.description}</p>
                        <a href="${project.link}" target="_blank" class="case-link">Explore Architecture →</a>
                    </div>
                `;
                projectsContainer.appendChild(row);
            });
        }).catch(err => console.error('Error evaluating local JSON dataset mapping:', err));

        function filterSkills(category, event) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            } else if (event && event.target) {
                event.target.classList.add('active');
            }

            const cards = document.querySelectorAll('.skill-chip');
            cards.forEach(card => {
                if (category === 'all' || card.getAttribute('data-category') === category) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
